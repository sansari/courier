name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Seed example data
        run: |
          cp magazines.example.md magazines.md
          cp stories.example.md stories.md

      - name: Build web frontend
        run: npm run build:web

      - name: Verify output
        run: |
          grep -q "Courier" dist/index.html && echo "PASS: index.html contains Courier" || (echo "FAIL: index.html missing expected content" && exit 1)
          test -f public/magazines.json && echo "PASS: magazines.json generated" || (echo "FAIL: magazines.json missing" && exit 1)
          test -f public/stories.json && echo "PASS: stories.json generated" || (echo "FAIL: stories.json missing" && exit 1)
